  <path d="M48 54l4 10 10 4-10 4-4 10-4-10-10-4 10-4 4-10Z" fill="url(#gold)"/>
  <path d="M144 40l3 7 7 3-7 3-3 7-3-7-7-3 7-3 3-7Z" fill="#a020f0"/>
